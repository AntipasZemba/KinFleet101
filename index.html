<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinFleet | Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
    <!-- LOGIN PAGE -->
    <section id="loginPage" class="flex items-center justify-center h-screen">
        <div class="card max-w-sm w-full text-center">
            <h1 class="text-2xl font-semibold mb-6">KinFleet Login</h1>
            <input type="text" id="username" placeholder="Username" class="w-full p-2 mb-3 rounded-md">
            <input type="password" id="password" placeholder="Password" class="w-full p-2 mb-4 rounded-md">
            <button id="loginBtn" class="bg-black text-white w-full py-2 rounded-md hover:bg-gray-800 transition">Login</button>
            <p id="loginError" class="text-red-600 mt-3 hidden">Invalid credentials</p>
        </div>
    </section>

    <!-- DASHBOARD -->
    <main id="dashboard" class="hidden max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold mb-1">Dashboard</h1>
            <p class="text-gray-600">Cashflow & Management System</p>
                <p class="text-sm text-gray-500 mt-2">
                Logged in as: 
                <span id="currentAdmin" class="font-semibold"></span>
                (<span id="currentRole" class="font-semibold"></span>)
            </p>
        </header>
    </main>

    <!-- FILTER + SUMMARY -->
    <section class="flex flex-wrap gap-4 mb-8 items-end">
      <div>
        <label class="block text-sm">Filter by Month</label>
        <input type="month" id="monthFilter" class="p-2 rounded-md border">
      </div>
      <div class="ml-auto flex gap-4">
        <button onclick="exportExcel()" class="bg-black text-white px-4 py-2 rounded-md hover:bg-gray-800 transition">Export Excel</button>
        <button onclick="logout()" class="border px-4 py-2 rounded-md hover:bg-gray-100 transition">Logout</button>
        <button onclick="toggleAdminPanel()" class="border px-4 py-2 rounded-md hover:bg-gray-100 transition">Manage Admins</button>
      </div>
    </section>

    <!--Admin Management-->
    <section id="adminPanel" class="card mb-8 hidden">
        <h2 class="text-xl font-semibold mb-4">Admin Management</h2>

        <form id="addAdminForm" class="space-y-2 mb-4">
            <input type="text" id="newAdminUser" placeholder="New Username" class="w-full p-2 rounded-md" required>
            <input type="password" id="newAdminPass" placeholder="New Password" class="w-full p-2 rounded-md" required>
            <button type="submit" class="bg-black text-white w-full py-2 rounded-md hover:bg-gray-800 transition">
            Add Admin
            </button>
        </form>

        <ul id="adminList" class="text-sm space-y-1"></ul>
    </section>

    <!-- SUMMARY -->
    <section class="grid md:grid-cols-3 gap-4 mb-8">
      <div class="card text-center">
        <p class="text-sm text-gray-500">Total Earnings</p>
        <h2 id="totalEarnings" class="text-2xl font-semibold">$0</h2>
      </div>
      <div class="card text-center">
        <p class="text-sm text-gray-500">Maintenance Cost</p>
        <h2 id="totalMaintenance" class="text-2xl font-semibold">$0</h2>
      </div>
      <div class="card text-center">
        <p class="text-sm text-gray-500">Net Profit</p>
        <h2 id="netProfit" class="text-2xl font-semibold">$0</h2>
      </div>
    </section>
</body>
</html>
